# Global defaults (all overridable per stack)
defaults:
  poll_interval: 60
  branch: main
  work_dir: /var/lib/stack-agent/stacks
  # token is optional here — stack-agent will automatically fall back to the
  # STACK_AGENT_DEFAULT_TOKEN environment variable if no token is configured.

stacks:
  - name: immich
    repo: https://github.com/example/host-services.git
    path: stacks/immich
    branch: main
    env_file: /opt/stack-agent/env/immich.env
    poll_interval: 60

  - name: nextcloud
    repo: https://github.com/example/host-services.git
    path: stacks/nextcloud
    env_file: /opt/stack-agent/env/nextcloud.env
    poll_interval: 120
